<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colspan and rowspan </title>
</head>
<body>
    <table border="10">
      <caption>food menu</caption>
      <thead>
      <tr>
        <th colspan="2">item</th>
        <th rowspan="2">price</th>
      </tr>
      <tr>
        <th>ind</th>
        <th>US</th>
      </tr>
      </thead>
      <tbody>
        <tr>
            <td>frooti</td>
            <td>10</td>
            <td>20</td>
        </tr>
        <tr>
            <td>somosa</td>
            <td>5</td>
            <td>10</td>
            
        </tr>
        <tr>
            <td>maza</td>
            <td>15</td>
            <td>30</td>
        </tr>
      </tbody>

     
    </table>
    
</body>
</html>
