<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display properties</title>
    <style>
     span{
        display: block;
     }
     h1,h2{
        display: inline;
     }
    </style>
</head>
<body>
   <h1>heading 1</h1> 
   <h2> heading 2</h2>
   <span> span 1</span>
   <span> span 2</span>
</body>
</html>
