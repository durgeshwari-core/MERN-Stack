<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <style>
        #hide {
            color: red;
            font-size: 15px;
            display: none;
        }
    </style>
</head>

<body>
    <form action="">
        <input type="name" placeholder="name" id="name">
        <br><br>
        <div id="hide">
            <small> your name must have at least 2 characters</small><br><br></div>
        <input type="email" placeholder="xyx234@gmail.com">
        <br><br>
        <input type="password" placeholder="password">
        <br><br>
        <select>
            <option value="male">male</option>
            <option value="female">female</option>
            <option value="others">others</option>
        </select>
        <br><br>
        <textarea></textarea>
        <br><br>
        <button type="submit">submit</button>
    </form>
    <script src="form.js"></script>
</body>

</html>
