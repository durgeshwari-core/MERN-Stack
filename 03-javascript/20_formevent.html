<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <style>
        html,
        body {
            height: 100%;
            width: 100%;
        }

        input {
            display: block;
        }

        #main {
            padding: 50px;
            background-color: #222;
            height: 100%;
            width: 100%;
            color: aliceblue;

        }

        .card {
            display: inline-block;
            max-width: 200px;
            margin-top: 40px;
            padding: 20px;
            border: 1px solid #555;
            border-radius: 10px;

        }

        .profile {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            margin-bottom: 7px;
            overflow: hidden;

        }

        .profile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card p {
            margin-top: 20px;
            font-size: 12px;
        }

        .card h5 {
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div id="main">
        <form action="">
            <input type="text" placeholder="profilepic">
            <input type="text" placeholder="name">
            <input type="text" placeholder="occupation">
            <input type="text" placeholder="info">
            <input type="submit">
        </form>
